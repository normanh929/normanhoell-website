backend:
  name: git-gateway
  branch: main

local_backend: true

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "news"
    label: "News & Blog"
    files:
      - name: "news"
        label: "News-Beiträge"
        file: "content/news.json"
        fields:
          - label: "Beiträge"
            name: "posts"
            widget: "list"
            summary: "{{title}} – {{date}}"
            fields:
              - { label: "Titel", name: "title", widget: "string" }
              - { label: "Datum", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
              - { label: "Kurztext", name: "excerpt", widget: "text" }
